<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Highlight Contrast Lab</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #0b0e17; color: #eef1f7;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    header { padding: 22px 26px 6px; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 6px 0 0; color: #8a93a8; font-size: 13px; line-height: 1.6; max-width: 820px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px; padding: 18px 26px 60px; }
    .cell { background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px; overflow: hidden; }
    .cell canvas { width: 100%; height: 250px; display: block; cursor: grab; }
    .cap { padding: 11px 14px 13px; border-top: 1px solid rgba(255,255,255,.08); }
    .cap b { font-size: 13.5px; } .cap .n { color: #6ea8ff; margin-right: 6px; }
    .cap span { display: block; margin-top: 3px; font-size: 12px; color: #8a93a8; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>高亮对比度对比:转动面保留原色,其余面淡化</h1>
    <p>都是「顶面(U)顺时针转」这一步,箭头统一黄色。区别在于**非转动面的淡化方式和强度**——转动面始终保留原色。
       要求:其余面颜色仍要认得出。挑一个对比度最合适的告诉我编号,我就把它 + 黄色箭头做进 app。可拖动观察。</p>
  </header>
  <div class="grid" id="grid"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RubiksCube, UNIT } from './src/cube.js';

    const FACE_Y = 1.5, TH_CAM = Math.atan2(6, 3.6), DIR = -1, YELLOW = 0xffc21a;

    function glowMat(hex, i = 0.95) {
      return new THREE.MeshStandardMaterial({ color: hex, emissive: hex, emissiveIntensity: i,
        roughness: 0.3, metalness: 0, toneMapped: false, depthTest: false, depthWrite: false });
    }
    function arc(mat, { R = 1.7, span = 2.0, thick = 0.085 } = {}) {
      const g = new THREE.Group();
      const th0 = TH_CAM - DIR * span / 2, th1 = TH_CAM + DIR * span / 2;
      const P = th => new THREE.Vector3(R * Math.cos(th), FACE_Y, R * Math.sin(th));
      const pts = []; for (let i = 0; i <= 40; i++) pts.push(P(th0 + (th1 - th0) * i / 40));
      const tube = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 60, thick, 12, false), mat);
      tube.renderOrder = 20; g.add(tube);
      const tan = new THREE.Vector3(-Math.sin(th1), 0, Math.cos(th1)).multiplyScalar(DIR).normalize();
      const head = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.62, 22), mat);
      head.renderOrder = 20; head.position.copy(P(th1));
      head.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tan); g.add(head);
      return g;
    }

    // fade every sticker EXCEPT the 9 on the top face (local +y sticker, position.y > 0.4)
    function fadeCube(cube, fn) {
      cube.cubies.forEach(cu => cu.children.forEach(ch => {
        if (!ch.userData.isSticker || ch.position.y > 0.4) return; // keep the top face at full colour
        fn(ch.material.color);
      }));
    }
    const WHITE = new THREE.Color(0xffffff);
    const towardWhite = a => c => c.lerp(WHITE.clone(), a);
    const desat = a => c => { const h = {}; c.getHSL(h); c.setHSL(h.h, h.s * (1 - a), h.l); };
    const darken = a => c => c.multiplyScalar(1 - a);
    const combo = (...fns) => c => fns.forEach(f => f(c));

    const VARIANTS = [
      { name: '淡白 · 轻 (35%)', desc: '非转动面向白色淡化 35%', fn: towardWhite(0.35) },
      { name: '淡白 · 中 (55%)', desc: '向白色淡化 55%', fn: towardWhite(0.55) },
      { name: '淡白 · 重 (72%)', desc: '向白色淡化 72%(接近你的参考图)', fn: towardWhite(0.72) },
      { name: '去饱和 · 中 (55%)', desc: '降低饱和度 55%,亮度不变', fn: desat(0.55) },
      { name: '去饱和 · 重 (78%)', desc: '降低饱和度 78%', fn: desat(0.78) },
      { name: '变暗 · 中 (45%)', desc: '整体压暗 45%', fn: darken(0.45) },
      { name: '去饱和 + 淡白', desc: '饱和 -60% 再向白淡化 25%(柔和干净)', fn: combo(desat(0.6), towardWhite(0.25)) },
      { name: '去饱和 + 变暗', desc: '饱和 -50% + 压暗 28%(沉稳对比)', fn: combo(desat(0.5), darken(0.28)) },
    ];

    const grid = document.getElementById('grid');
    const views = [];
    VARIANTS.forEach((variant, idx) => {
      const cell = document.createElement('div'); cell.className = 'cell';
      const canvas = document.createElement('canvas');
      const cap = document.createElement('div'); cap.className = 'cap';
      cap.innerHTML = `<b><span class="n">#${idx + 1}</span>${variant.name}</b><span>${variant.desc}</span>`;
      cell.append(canvas, cap); grid.appendChild(cell);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;

      const scene = new THREE.Scene();
      scene.add(new THREE.HemisphereLight(0xffffff, 0x556, 1.15));
      const key = new THREE.DirectionalLight(0xffffff, 1.9); key.position.set(5, 9, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xbcd0ff, 0.6); fill.position.set(-6, 2, -3); scene.add(fill);

      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(3.6, 4.2, 6); camera.lookAt(0, 0, 0);
      const controls = new OrbitControls(camera, canvas);
      controls.enableZoom = false; controls.enablePan = false;
      controls.enableDamping = true; controls.target.set(0, 0, 0);

      const cube = new RubiksCube();
      fadeCube(cube, variant.fn);
      scene.add(cube.group);
      const a = arc(glowMat(YELLOW)); cube.group.add(a);

      views.push({ renderer, scene, camera, controls, canvas, a });
    });

    function resize(v) {
      const w = v.canvas.clientWidth, h = v.canvas.clientHeight;
      if (v.canvas.width !== w || v.canvas.height !== h) {
        v.renderer.setSize(w, h, false); v.camera.aspect = w / h; v.camera.updateProjectionMatrix();
      }
    }
    (function loop() {
      requestAnimationFrame(loop);
      const b = 0.7 + 0.35 * (0.5 + 0.5 * Math.sin(performance.now() / 360));
      for (const v of views) {
        resize(v); v.controls.update();
        v.a.traverse(o => o.material && (o.material.emissiveIntensity = b));
        v.renderer.render(v.scene, v.camera);
      }
    })();
  </script>
</body>
</html>
