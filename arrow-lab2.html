<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arrow Design Lab v2</title>
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #0b0e17; color: #eef1f7;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    header { padding: 22px 26px 6px; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 6px 0 0; color: #8a93a8; font-size: 13px; line-height: 1.6; max-width: 820px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 18px; padding: 18px 26px 60px; }
    .cell { background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px; overflow: hidden; }
    .cell canvas { width: 100%; height: 240px; display: block; cursor: grab; }
    .cap { padding: 11px 14px 13px; border-top: 1px solid rgba(255,255,255,.08); }
    .cap b { font-size: 13.5px; } .cap .n { color: #6ea8ff; margin-right: 6px; }
    .cap span { display: block; margin-top: 3px; font-size: 12px; color: #8a93a8; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>箭头设计 · 10 版对比(顶面顺时针转)</h1>
    <p>全部对称、半圆感、贴着转动面上方低空悬浮(首尾都在视野内、不碰色块)。高亮统一用「戏剧/强对比」档。
       挑一个最喜欢的箭头编号告诉我,我就把它 + 高亮 C 正式做进 app。可拖动观察。</p>
  </header>
  <div class="grid" id="grid"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RubiksCube, UNIT, COLORS } from './src/cube.js';
    import { CubeState, randomScramble } from './src/state.js';

    const AF = Math.atan2(6, 3.6); // camera-facing angle in the top plane → arc is symmetric about it
    const DIR = -1;                // clockwise-from-top
    const SCRAMBLE = randomScramble(18);

    function scrambleColours(cube) {
      const st = new CubeState().moves(SCRAMBLE);
      cube.cubies.forEach(cu => {
        const p = [Math.round(cu.position.x / UNIT), Math.round(cu.position.y / UNIT), Math.round(cu.position.z / UNIT)];
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          const n = [Math.round(ch.position.x * 2), Math.round(ch.position.y * 2), Math.round(ch.position.z * 2)];
          const l = st.colorAt(p, n); if (l) ch.material.color.setHex(COLORS[l]);
        });
      });
    }
    const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
    function hsl(c, s, l) { const h = {}; c.getHSL(h); c.setHSL(h.h, clamp(h.s * s, 0, 1), clamp(h.l * l, 0, 1)); }
    // highlight variant C: active layer bright + glow, other layers dark
    function applyC(cube) {
      const glow = [];
      cube.cubies.forEach(cu => {
        const active = Math.round(cu.position.y / UNIT) === 1;
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          if (active) { hsl(ch.material.color, 1.16, 1.12); ch.material.emissive.copy(ch.material.color); glow.push(ch.material); }
          else hsl(ch.material.color, 0.42, 0.3);
        });
      });
      return glow;
    }

    const YEL = { color: 0xffce1f, emissive: 0xffb200 };
    function amat() {
      return new THREE.MeshStandardMaterial({ color: YEL.color, emissive: YEL.emissive, emissiveIntensity: 0.9,
        roughness: 0.34, metalness: 0, toneMapped: false, side: THREE.DoubleSide });
    }
    // place a flat shape (built in XY) into the horizontal plane, floating at `float`
    function layFlat(mesh, float) {
      mesh.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(
        new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 1, 0)));
      mesh.position.set(0, float, 0);
    }
    const P = (r, a) => [r * Math.cos(a), r * Math.sin(a)];

    // symmetric ribbon arc + tapered head, built as one Shape
    function ribbon({ R = 1.5, band = 0.22, span = 3.5, headLen = 0.55, wing = 0.2, widthAt = null, N = 34 } = {}) {
      const a0 = AF - DIR * span / 2, a1 = AF + DIR * span / 2, aH = a1 - DIR * headLen;
      const w = widthAt || (() => band);
      const s = new THREE.Shape();
      const ro = f => R + w(f) / 2, ri = f => R - w(f) / 2;
      s.moveTo(...P(ro(0), a0));
      for (let i = 1; i <= N; i++) { const f = i / N; s.lineTo(...P(ro(f), a0 + (aH - a0) * f)); }
      s.lineTo(...P(ro(1) + wing, aH));
      s.lineTo(...P(R, a1));
      s.lineTo(...P(ri(1) - wing, aH));
      for (let i = N; i >= 0; i--) { const f = i / N; s.lineTo(...P(ri(f), a0 + (aH - a0) * f)); }
      s.closePath();
      return s;
    }
    function extrude(shape, thick = 0.05) {
      const g = new THREE.ExtrudeGeometry(shape, { depth: thick, bevelEnabled: false });
      g.translate(0, 0, -thick / 2); return g;
    }

    // ---- 10 arrow designs ----------------------------------------------------
    const ARROWS = [
      { name: '经典缎带', desc: '对称半圆缎带 + 锥形箭头(基准)', make() {
        const m = new THREE.Mesh(extrude(ribbon({})), amat()); const g = new THREE.Group(); layFlat(m, 1.64); g.add(m); return g; } },

      { name: '纤细优雅', desc: '细带、锐利小箭头,克制精致', make() {
        const m = new THREE.Mesh(extrude(ribbon({ band: 0.11, wing: 0.14, headLen: 0.45 }), 0.04), amat()); const g = new THREE.Group(); layFlat(m, 1.64); g.add(m); return g; } },

      { name: '粗壮有力', desc: '宽带、大箭头,醒目', make() {
        const m = new THREE.Mesh(extrude(ribbon({ band: 0.34, wing: 0.28, headLen: 0.62, R: 1.48 }), 0.06), amat()); const g = new THREE.Group(); layFlat(m, 1.66); g.add(m); return g; } },

      { name: '渐宽(尾细头宽)', desc: '从尾到头逐渐变宽,有笔锋感', make() {
        const wa = f => 0.05 + 0.24 * f;
        const m = new THREE.Mesh(extrude(ribbon({ widthAt: wa, wing: 0.22 })), amat()); const g = new THREE.Group(); layFlat(m, 1.64); g.add(m); return g; } },

      { name: '双线', desc: '两条同心细弧 + 箭头,几何感', make() {
        const g = new THREE.Group();
        const a = new THREE.Mesh(extrude(ribbon({ R: 1.62, band: 0.07, headLen: 0.5, wing: 0.16 }), 0.04), amat());
        const b = new THREE.Mesh(extrude(ribbon({ R: 1.42, band: 0.07, headLen: 0.001, wing: 0 }), 0.04), amat());
        layFlat(a, 1.64); layFlat(b, 1.64); g.add(a, b); return g; } },

      { name: '刷新环 ↻', desc: '接近整圈的对称环 + 箭头(最"旋转"的图标感)', make() {
        const m = new THREE.Mesh(extrude(ribbon({ R: 1.45, band: 0.17, span: 5.2, headLen: 0.5, wing: 0.2 }), 0.05), amat()); const g = new THREE.Group(); layFlat(m, 1.64); g.add(m); return g; } },

      { name: '雪佛龙弧', desc: '沿弧线排布的 V 形箭头,轻盈现代', make() {
        const g = new THREE.Group(); const mat = amat(); const span = 2.7, K = 4, R = 1.5, float = 1.66;
        for (let i = 0; i < K; i++) {
          const a = AF - DIR * span / 2 + DIR * span * (i / (K - 1));
          const s = new THREE.Shape();
          s.moveTo(0.17, 0); s.lineTo(-0.11, 0.17); s.lineTo(-0.02, 0); s.lineTo(-0.11, -0.17); s.closePath();
          const m = new THREE.Mesh(extrude(s, 0.05), mat);
          const tan = new THREE.Vector3(-Math.sin(a), 0, Math.cos(a)).multiplyScalar(DIR).normalize();
          const up = new THREE.Vector3(0, 1, 0);
          const yAx = new THREE.Vector3().crossVectors(up, tan).normalize();
          m.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(tan, yAx, up));
          m.position.set(R * Math.cos(a), float, R * Math.sin(a));
          g.add(m);
        }
        return g; } },

      { name: '虚线弧', desc: '断续短段 + 箭头,像"运动轨迹"', make() {
        const g = new THREE.Group(); const span = 3.2, segs = 7, gap = 0.45;
        for (let i = 0; i < segs; i++) {
          const f0 = i / segs, f1 = f0 + (1 - gap) / segs;
          const a0 = AF - DIR * span / 2 + DIR * span * f0, a1 = AF - DIR * span / 2 + DIR * span * f1;
          const s = new THREE.Shape();
          s.moveTo(...P(1.61, a0)); s.lineTo(...P(1.61, a1)); s.lineTo(...P(1.39, a1)); s.lineTo(...P(1.39, a0)); s.closePath();
          const m = new THREE.Mesh(extrude(s, 0.045), amat()); layFlat(m, 1.64); g.add(m);
        }
        const ah = AF + DIR * span / 2;
        const head = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 3), amat());
        head.position.set(P(1.5, ah)[0], 1.64, P(1.5, ah)[1]);
        const tan = new THREE.Vector3(-Math.sin(ah), 0, Math.cos(ah)).multiplyScalar(DIR);
        head.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tan); g.add(head); return g; } },

      { name: '圆头缎带', desc: '缎带两端圆润收尾,柔和高级', make() {
        const g = new THREE.Group();
        const m = new THREE.Mesh(extrude(ribbon({ band: 0.2, headLen: 0.5 })), amat()); layFlat(m, 1.64); g.add(m);
        const a0 = AF - DIR * 3.5 / 2;
        const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.05, 16), amat());
        cap.position.set(P(1.5, a0)[0], 1.64, P(1.5, a0)[1]); g.add(cap); return g; } },

      { name: '发光弧', desc: '缎带 + 柔和外发光,有氛围感', make() {
        const g = new THREE.Group();
        const m = new THREE.Mesh(extrude(ribbon({ band: 0.18 })), amat()); layFlat(m, 1.65); g.add(m);
        const glowMat = new THREE.MeshBasicMaterial({ color: 0xffdd55, transparent: true, opacity: 0.22, side: THREE.DoubleSide, toneMapped: false });
        const gm = new THREE.Mesh(extrude(ribbon({ band: 0.42 }), 0.02), glowMat); layFlat(gm, 1.63); g.add(gm); return g; } },
    ];

    const grid = document.getElementById('grid');
    const views = [];
    ARROWS.forEach((arrow, idx) => {
      const cell = document.createElement('div'); cell.className = 'cell';
      const canvas = document.createElement('canvas');
      const cap = document.createElement('div'); cap.className = 'cap';
      cap.innerHTML = `<b><span class="n">#${idx + 1}</span>${arrow.name}</b><span>${arrow.desc}</span>`;
      cell.append(canvas, cap); grid.appendChild(cell);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;
      const scene = new THREE.Scene();
      scene.add(new THREE.HemisphereLight(0xffffff, 0x556, 1.15));
      const key = new THREE.DirectionalLight(0xffffff, 1.9); key.position.set(5, 9, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xbcd0ff, 0.6); fill.position.set(-6, 2, -3); scene.add(fill);
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(3.6, 4.2, 6); camera.lookAt(0, 0, 0);
      const controls = new OrbitControls(camera, canvas);
      controls.enableZoom = false; controls.enablePan = false; controls.enableDamping = true;

      const cube = new RubiksCube(); scrambleColours(cube);
      const glow = applyC(cube); scene.add(cube.group);
      const a = arrow.make(); cube.group.add(a);
      views.push({ renderer, scene, camera, controls, canvas, a, glow });
    });

    function resize(v) {
      const w = v.canvas.clientWidth, h = v.canvas.clientHeight;
      if (v.canvas.width !== w || v.canvas.height !== h) { v.renderer.setSize(w, h, false); v.camera.aspect = w / h; v.camera.updateProjectionMatrix(); }
    }
    (function loop() {
      requestAnimationFrame(loop);
      const b = 0.5 + 0.5 * Math.sin(performance.now() / 360);
      for (const v of views) {
        resize(v); v.controls.update();
        v.a.traverse(o => o.material && o.material.emissive && (o.material.emissiveIntensity = 0.7 + 0.4 * b));
        v.glow.forEach(m => m.emissiveIntensity = 0.06 + 0.16 * b);
        v.renderer.render(v.scene, v.camera);
      }
    })();
  </script>
</body>
</html>
