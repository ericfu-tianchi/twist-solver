<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arrow Design Lab v2</title>
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #0b0e17; color: #eef1f7;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    header { padding: 22px 26px 6px; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 6px 0 0; color: #8a93a8; font-size: 13px; line-height: 1.6; max-width: 820px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 18px; padding: 18px 26px 60px; }
    .cell { background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px; overflow: hidden; }
    .cell canvas { width: 100%; height: 240px; display: block; cursor: grab; }
    .cap { padding: 11px 14px 13px; border-top: 1px solid rgba(255,255,255,.08); }
    .cap b { font-size: 13.5px; } .cap .n { color: #6ea8ff; margin-right: 6px; }
    .cap span { display: block; margin-top: 3px; font-size: 12px; color: #8a93a8; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>箭头设计 · 10 版对比(顶面顺时针转)</h1>
    <p>全部对称、半圆感、贴着转动面上方低空悬浮(首尾都在视野内、不碰色块)。高亮统一用「戏剧/强对比」档。
       挑一个最喜欢的箭头编号告诉我,我就把它 + 高亮 C 正式做进 app。可拖动观察。</p>
  </header>
  <div class="grid" id="grid"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RubiksCube, UNIT, COLORS } from './src/cube.js';
    import { CubeState, randomScramble } from './src/state.js';

    const AF = Math.atan2(6, 3.6); // camera-facing angle in the top plane → arc is symmetric about it
    const DIR = -1;                // clockwise-from-top
    const SCRAMBLE = randomScramble(18);

    function scrambleColours(cube) {
      const st = new CubeState().moves(SCRAMBLE);
      cube.cubies.forEach(cu => {
        const p = [Math.round(cu.position.x / UNIT), Math.round(cu.position.y / UNIT), Math.round(cu.position.z / UNIT)];
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          const n = [Math.round(ch.position.x * 2), Math.round(ch.position.y * 2), Math.round(ch.position.z * 2)];
          const l = st.colorAt(p, n); if (l) ch.material.color.setHex(COLORS[l]);
        });
      });
    }
    const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
    function hsl(c, s, l) { const h = {}; c.getHSL(h); c.setHSL(h.h, clamp(h.s * s, 0, 1), clamp(h.l * l, 0, 1)); }
    // highlight variant C: active layer bright + glow, other layers dark
    function applyC(cube) {
      const glow = [];
      cube.cubies.forEach(cu => {
        const active = Math.round(cu.position.y / UNIT) === 1;
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          if (active) { hsl(ch.material.color, 1.16, 1.12); ch.material.emissive.copy(ch.material.color); glow.push(ch.material); }
          else hsl(ch.material.color, 0.42, 0.3);
        });
      });
      return glow;
    }

    const YEL = { color: 0xffce1f, emissive: 0xffb200 };
    function amat() {
      return new THREE.MeshStandardMaterial({ color: YEL.color, emissive: YEL.emissive, emissiveIntensity: 0.9,
        roughness: 0.34, metalness: 0, toneMapped: false, side: THREE.DoubleSide });
    }
    // place a flat shape (built in XY) into the horizontal plane, floating at `float`
    function layFlat(mesh, float) {
      mesh.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(
        new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 1, 0)));
      mesh.position.set(0, float, 0);
    }
    const P = (r, a) => [r * Math.cos(a), r * Math.sin(a)];

    const FLOAT = 1.0;       // height of the top LAYER's front faces — the arrow wraps across them
    // ribbon arc built in the (radius, angle) plane; head at a1 (tangent → turn direction)
    function ribbon({ R = 1.72, band = 0.2, a0, a1, headLen = 0.5, wing = 0.22, widthAt = null, N = 44 }) {
      const dir = Math.sign(a1 - a0);
      const aH = a1 - dir * headLen;
      const w = widthAt || (() => band);
      const ro = f => R + w(f) / 2, ri = f => R - w(f) / 2;
      const s = new THREE.Shape();
      s.moveTo(...P(ro(0), a0));
      for (let i = 1; i <= N; i++) { const f = i / N; s.lineTo(...P(ro(f), a0 + (aH - a0) * f)); }
      s.lineTo(...P(ro(1) + wing, aH));
      s.lineTo(...P(R, a1));                                  // arrow tip (tangent)
      s.lineTo(...P(ri(1) - wing, aH));
      for (let i = N; i >= 0; i--) { const f = i / N; s.lineTo(...P(ri(f), a0 + (aH - a0) * f)); }
      s.closePath();
      return s;
    }
    function extrude(shape, thick = 0.05) {
      const g = new THREE.ExtrudeGeometry(shape, { depth: thick, bevelEnabled: false });
      g.translate(0, 0, -thick / 2); return g;
    }
    const ARC = { a0: 2.72, a1: 0.32 };  // ~137° arc hugging the FRONT of the turning layer

    // ---- arrow designs — a horizontal arrow WRAPPING around the turning layer ---
    // a horizontal arrow ACROSS the front faces of the turning layer, curling up at the
    // right to show the wrap. Built in the plane just in front of those faces.
    const ZFRONT = 1.66;  // just in front of the front stickers (1.55) — never touches
    function frontArrow({ band = 0.16, headW = 0.24, curl = 0.55, tHead = 0.8, y = 0.62, thick = 0.05 } = {}) {
      const hw = band / 2, N = 36;
      const c = t => new THREE.Vector2(-1.35 + 2.55 * t, 0.1 * t + curl * t * t * t);
      const tang = t => { const e = 0.001; const a = c(Math.max(0, t - e)), b = c(Math.min(1, t + e)); return b.sub(a).normalize(); };
      const nrm = t => { const g = tang(t); return new THREE.Vector2(-g.y, g.x); };
      const top = [], bot = [];
      for (let i = 0; i <= N; i++) { const t = tHead * i / N, p = c(t), n = nrm(t); top.push([p.x + n.x * hw, p.y + n.y * hw]); bot.push([p.x - n.x * hw, p.y - n.y * hw]); }
      const s = new THREE.Shape();
      s.moveTo(...top[0]);
      for (let i = 1; i < top.length; i++) s.lineTo(...top[i]);
      const ph = c(tHead), nh = nrm(tHead), tip = c(1);
      s.lineTo(ph.x + nh.x * headW, ph.y + nh.y * headW);
      s.lineTo(tip.x, tip.y);
      s.lineTo(ph.x - nh.x * headW, ph.y - nh.y * headW);
      for (let i = bot.length - 1; i >= 0; i--) s.lineTo(...bot[i]);
      s.closePath();
      const m = new THREE.Mesh(extrude(s, thick), amat());
      m.position.set(0, y, ZFRONT);
      const g = new THREE.Group(); g.add(m); return g;
    }

    // ---- arrow designs — horizontal arrow across the FRONT of the turning layer ---
    const ARROWS = [
      { name: '横向 · 中', desc: '横跨转动层前方、右端上扬环绕(基准 · 推荐)', make() { return frontArrow(); } },
      { name: '横向 · 细', desc: '细箭头,克制精致', make() { return frontArrow({ band: 0.1, headW: 0.18, thick: 0.04 }); } },
      { name: '横向 · 粗大头', desc: '粗 + 大箭头,醒目', make() { return frontArrow({ band: 0.26, headW: 0.34, thick: 0.06 }); } },
      { name: '几乎水平', desc: '基本水平,仅末端微微上扬', make() { return frontArrow({ curl: 0.3 }); } },
    ];

    const grid = document.getElementById('grid');
    const views = [];
    ARROWS.forEach((arrow, idx) => {
      const cell = document.createElement('div'); cell.className = 'cell';
      const canvas = document.createElement('canvas');
      const cap = document.createElement('div'); cap.className = 'cap';
      cap.innerHTML = `<b><span class="n">#${idx + 1}</span>${arrow.name}</b><span>${arrow.desc}</span>`;
      cell.append(canvas, cap); grid.appendChild(cell);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;
      const scene = new THREE.Scene();
      scene.add(new THREE.HemisphereLight(0xffffff, 0x556, 1.15));
      const key = new THREE.DirectionalLight(0xffffff, 1.9); key.position.set(5, 9, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xbcd0ff, 0.6); fill.position.set(-6, 2, -3); scene.add(fill);
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(3.0, 1.3, 6.6); camera.lookAt(0, 0, 0); // near straight-on, like the reference
      const controls = new OrbitControls(camera, canvas);
      controls.enableZoom = false; controls.enablePan = false; controls.enableDamping = true;

      const cube = new RubiksCube(); scrambleColours(cube);
      const glow = applyC(cube); scene.add(cube.group);
      const a = arrow.make(); cube.group.add(a);
      views.push({ renderer, scene, camera, controls, canvas, a, glow });
    });

    function resize(v) {
      const w = v.canvas.clientWidth, h = v.canvas.clientHeight;
      if (v.canvas.width !== w || v.canvas.height !== h) { v.renderer.setSize(w, h, false); v.camera.aspect = w / h; v.camera.updateProjectionMatrix(); }
    }
    (function loop() {
      requestAnimationFrame(loop);
      const b = 0.5 + 0.5 * Math.sin(performance.now() / 360);
      for (const v of views) {
        resize(v); v.controls.update();
        v.a.traverse(o => o.material && o.material.emissive && (o.material.emissiveIntensity = 0.7 + 0.4 * b));
        v.glow.forEach(m => m.emissiveIntensity = 0.06 + 0.16 * b);
        v.renderer.render(v.scene, v.camera);
      }
    })();
  </script>
</body>
</html>
