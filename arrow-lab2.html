<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arrow Design Lab v2</title>
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #0b0e17; color: #eef1f7;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    header { padding: 22px 26px 6px; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 6px 0 0; color: #8a93a8; font-size: 13px; line-height: 1.6; max-width: 820px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 18px; padding: 18px 26px 60px; }
    .cell { background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px; overflow: hidden; }
    .cell canvas { width: 100%; height: 240px; display: block; cursor: grab; }
    .cap { padding: 11px 14px 13px; border-top: 1px solid rgba(255,255,255,.08); }
    .cap b { font-size: 13.5px; } .cap .n { color: #6ea8ff; margin-right: 6px; }
    .cap span { display: block; margin-top: 3px; font-size: 12px; color: #8a93a8; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>箭头设计 · 10 版对比(顶面顺时针转)</h1>
    <p>全部对称、半圆感、贴着转动面上方低空悬浮(首尾都在视野内、不碰色块)。高亮统一用「戏剧/强对比」档。
       挑一个最喜欢的箭头编号告诉我,我就把它 + 高亮 C 正式做进 app。可拖动观察。</p>
  </header>
  <div class="grid" id="grid"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RubiksCube, UNIT, COLORS } from './src/cube.js';
    import { CubeState, randomScramble } from './src/state.js';

    const AF = Math.atan2(6, 3.6); // camera-facing angle in the top plane → arc is symmetric about it
    const DIR = -1;                // clockwise-from-top
    const SCRAMBLE = randomScramble(18);

    function scrambleColours(cube) {
      const st = new CubeState().moves(SCRAMBLE);
      cube.cubies.forEach(cu => {
        const p = [Math.round(cu.position.x / UNIT), Math.round(cu.position.y / UNIT), Math.round(cu.position.z / UNIT)];
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          const n = [Math.round(ch.position.x * 2), Math.round(ch.position.y * 2), Math.round(ch.position.z * 2)];
          const l = st.colorAt(p, n); if (l) ch.material.color.setHex(COLORS[l]);
        });
      });
    }
    const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
    function hsl(c, s, l) { const h = {}; c.getHSL(h); c.setHSL(h.h, clamp(h.s * s, 0, 1), clamp(h.l * l, 0, 1)); }
    // highlight variant C: active layer bright + glow, other layers dark
    function applyC(cube) {
      const glow = [];
      cube.cubies.forEach(cu => {
        const active = Math.round(cu.position.y / UNIT) === 1;
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          if (active) { hsl(ch.material.color, 1.16, 1.12); ch.material.emissive.copy(ch.material.color); glow.push(ch.material); }
          else hsl(ch.material.color, 0.42, 0.3);
        });
      });
      return glow;
    }

    const YEL = { color: 0xffce1f, emissive: 0xffb200 };
    function amat() {
      return new THREE.MeshStandardMaterial({ color: YEL.color, emissive: YEL.emissive, emissiveIntensity: 0.9,
        roughness: 0.34, metalness: 0, toneMapped: false, side: THREE.DoubleSide });
    }
    // place a flat shape (built in XY) into the horizontal plane, floating at `float`
    function layFlat(mesh, float) {
      mesh.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(
        new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 1, 0)));
      mesh.position.set(0, float, 0);
    }
    const P = (r, a) => [r * Math.cos(a), r * Math.sin(a)];

    const FLOAT = 1.66;      // just above the top stickers (1.5) — hovers, never touches
    const HEAD_A = 1.7;      // head sits near the front (visible); ring sweeps CW back to it
    // flat ring/arc ribbon lying in the top-face plane; head at a1 (tangent → spin direction)
    function ribbon({ R = 1.18, band = 0.16, a0, a1, headLen = 0.5, wing = 0.19, widthAt = null, N = 44 }) {
      const dir = Math.sign(a1 - a0);
      const aH = a1 - dir * headLen;
      const w = widthAt || (() => band);
      const ro = f => R + w(f) / 2, ri = f => R - w(f) / 2;
      const s = new THREE.Shape();
      s.moveTo(...P(ro(0), a0));
      for (let i = 1; i <= N; i++) { const f = i / N; s.lineTo(...P(ro(f), a0 + (aH - a0) * f)); }
      s.lineTo(...P(ro(1) + wing, aH));
      s.lineTo(...P(R, a1));                                  // arrow tip (tangent)
      s.lineTo(...P(ri(1) - wing, aH));
      for (let i = N; i >= 0; i--) { const f = i / N; s.lineTo(...P(ri(f), a0 + (aH - a0) * f)); }
      s.closePath();
      return s;
    }
    function extrude(shape, thick = 0.05) {
      const g = new THREE.ExtrudeGeometry(shape, { depth: thick, bevelEnabled: false });
      g.translate(0, 0, -thick / 2); return g;
    }
    const ARC = { a0: 3.4, a1: -0.2 };  // ~206° open arc lying across the top; opening faces the camera

    // chevrons / dashes placed along the ARC, flat on the top face
    function alongArc(fn, K) {
      for (let i = 0; i < K; i++) fn(ARC.a0 + (ARC.a1 - ARC.a0) * (i / (K - 1)), i);
    }

    // ---- arrow designs — all flat, in-plane SPIN arcs on the top face --------
    const ARROWS = [
      { name: '半圆弧 · 中', desc: '平躺在顶面上的半圆弧 + 切向箭头(基准 · 推荐)', make() {
        const g = new THREE.Group(); const m = new THREE.Mesh(extrude(ribbon({ ...ARC, band: 0.18 })), amat()); layFlat(m, FLOAT); g.add(m); return g; } },

      { name: '半圆弧 · 细', desc: '细弧,克制精致', make() {
        const g = new THREE.Group(); const m = new THREE.Mesh(extrude(ribbon({ ...ARC, band: 0.1, wing: 0.14, headLen: 0.44 }), 0.04), amat()); layFlat(m, FLOAT); g.add(m); return g; } },

      { name: '半圆弧 · 粗大头', desc: '宽弧 + 醒目大箭头', make() {
        const g = new THREE.Group(); const m = new THREE.Mesh(extrude(ribbon({ ...ARC, band: 0.26, wing: 0.3, headLen: 0.64 }), 0.06), amat()); layFlat(m, FLOAT); g.add(m); return g; } },

      { name: '渐宽半圆', desc: '尾细头宽,有笔锋感', make() {
        const g = new THREE.Group(); const m = new THREE.Mesh(extrude(ribbon({ ...ARC, widthAt: f => 0.05 + 0.24 * f, wing: 0.22 })), amat()); layFlat(m, FLOAT); g.add(m); return g; } },

      { name: '双弧', desc: '两条同心弧,几何感', make() {
        const g = new THREE.Group();
        const a = new THREE.Mesh(extrude(ribbon({ ...ARC, R: 1.3, band: 0.07, headLen: 0.44, wing: 0.14 }), 0.04), amat());
        const b = new THREE.Mesh(extrude(ribbon({ ...ARC, R: 1.06, band: 0.07, headLen: 0.001, wing: 0 }), 0.04), amat());
        layFlat(a, FLOAT); layFlat(b, FLOAT); g.add(a, b); return g; } },

      { name: '雪佛龙半圆', desc: '沿弧排布的 V 形箭头,轻盈', make() {
        const g = new THREE.Group(); const mat = amat();
        alongArc(a => {
          const s = new THREE.Shape(); s.moveTo(0.18, 0); s.lineTo(-0.1, 0.18); s.lineTo(-0.01, 0); s.lineTo(-0.1, -0.18); s.closePath();
          const m = new THREE.Mesh(extrude(s, 0.05), mat);
          const tan = new THREE.Vector3(-Math.sin(a), 0, Math.cos(a)).multiplyScalar(Math.sign(ARC.a1 - ARC.a0)).normalize();
          const up = new THREE.Vector3(0, 1, 0);
          m.quaternion.setFromRotationMatrix(new THREE.Matrix4().makeBasis(tan, new THREE.Vector3().crossVectors(up, tan).normalize(), up));
          m.position.set(1.18 * Math.cos(a), FLOAT, 1.18 * Math.sin(a)); g.add(m);
        }, 4);
        return g; } },

      { name: '虚线半圆', desc: '断续短段 + 箭头,运动轨迹感', make() {
        const g = new THREE.Group(); const R = 1.18, band = 0.15, segs = 6;
        const aBody = ARC.a1 - Math.sign(ARC.a1 - ARC.a0) * 0.55;
        for (let i = 0; i < segs; i++) {
          const f0 = i / segs, f1 = f0 + 0.62 / segs;
          const b0 = ARC.a0 + (aBody - ARC.a0) * f0, b1 = ARC.a0 + (aBody - ARC.a0) * f1;
          const s = new THREE.Shape();
          s.moveTo(...P(R + band / 2, b0)); s.lineTo(...P(R + band / 2, b1)); s.lineTo(...P(R - band / 2, b1)); s.lineTo(...P(R - band / 2, b0)); s.closePath();
          const m = new THREE.Mesh(extrude(s, 0.045), amat()); layFlat(m, FLOAT); g.add(m);
        }
        const head = new THREE.Mesh(extrude(ribbon({ a0: aBody, a1: ARC.a1, band, headLen: 0.5, wing: 0.2 }), 0.05), amat());
        layFlat(head, FLOAT); g.add(head); return g; } },

      { name: '发光半圆', desc: '弧 + 柔和外发光,氛围感', make() {
        const g = new THREE.Group();
        const m = new THREE.Mesh(extrude(ribbon({ ...ARC, band: 0.16 })), amat()); layFlat(m, FLOAT); g.add(m);
        const gmat = new THREE.MeshBasicMaterial({ color: 0xffdd55, transparent: true, opacity: 0.22, side: THREE.DoubleSide, toneMapped: false });
        const gm = new THREE.Mesh(extrude(ribbon({ ...ARC, band: 0.46 }), 0.02), gmat); layFlat(gm, FLOAT - 0.02); g.add(gm); return g; } },
    ];

    const grid = document.getElementById('grid');
    const views = [];
    ARROWS.forEach((arrow, idx) => {
      const cell = document.createElement('div'); cell.className = 'cell';
      const canvas = document.createElement('canvas');
      const cap = document.createElement('div'); cap.className = 'cap';
      cap.innerHTML = `<b><span class="n">#${idx + 1}</span>${arrow.name}</b><span>${arrow.desc}</span>`;
      cell.append(canvas, cap); grid.appendChild(cell);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;
      const scene = new THREE.Scene();
      scene.add(new THREE.HemisphereLight(0xffffff, 0x556, 1.15));
      const key = new THREE.DirectionalLight(0xffffff, 1.9); key.position.set(5, 9, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xbcd0ff, 0.6); fill.position.set(-6, 2, -3); scene.add(fill);
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(3.6, 4.2, 6); camera.lookAt(0, 0, 0);
      const controls = new OrbitControls(camera, canvas);
      controls.enableZoom = false; controls.enablePan = false; controls.enableDamping = true;

      const cube = new RubiksCube(); scrambleColours(cube);
      const glow = applyC(cube); scene.add(cube.group);
      const a = arrow.make(); cube.group.add(a);
      views.push({ renderer, scene, camera, controls, canvas, a, glow });
    });

    function resize(v) {
      const w = v.canvas.clientWidth, h = v.canvas.clientHeight;
      if (v.canvas.width !== w || v.canvas.height !== h) { v.renderer.setSize(w, h, false); v.camera.aspect = w / h; v.camera.updateProjectionMatrix(); }
    }
    (function loop() {
      requestAnimationFrame(loop);
      const b = 0.5 + 0.5 * Math.sin(performance.now() / 360);
      for (const v of views) {
        resize(v); v.controls.update();
        v.a.traverse(o => o.material && o.material.emissive && (o.material.emissiveIntensity = 0.7 + 0.4 * b));
        v.glow.forEach(m => m.emissiveIntensity = 0.06 + 0.16 * b);
        v.renderer.render(v.scene, v.camera);
      }
    })();
  </script>
</body>
</html>
