<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arrow & Highlight Lab</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #0b0e17; color: #eef1f7;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    header { padding: 22px 26px 6px; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: .02em; }
    header p { margin: 6px 0 0; color: #8a93a8; font-size: 13px; line-height: 1.6; max-width: 820px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px; padding: 18px 26px 60px; }
    .cell { background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px; overflow: hidden; }
    .cell canvas { width: 100%; height: 250px; display: block; cursor: grab; }
    .cap { padding: 11px 14px 13px; border-top: 1px solid rgba(255,255,255,.08); }
    .cap b { font-size: 13.5px; } .cap .n { color: #6ea8ff; margin-right: 6px; }
    .cap span { display: block; margin-top: 3px; font-size: 12px; color: #8a93a8; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>魔方「高亮 + 箭头」10 种方案对比</h1>
    <p>都用真实同款魔方渲染,演示的都是「顶面(U)顺时针转」这一步。每个格子可以用鼠标拖动旋转观察。
       挑一个你最喜欢的(高亮和箭头可以分开挑,比如"#3 的高亮 + #7 的箭头"),告诉我编号,我就做进 app。</p>
  </header>
  <div class="grid" id="grid"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RubiksCube, UNIT } from './src/cube.js';

    // ---- shared helpers on the U (top) face ---------------------------------
    const FACE_Y = 1.5;                       // outer surface of the top face
    const TH_CAM = Math.atan2(6, 3.6);        // angle on the top face that faces the camera
    const DIR = -1;                           // clockwise-from-top (U)

    function glowMat(hex, { intensity = 0.9, opacity = 1, transparent = false } = {}) {
      return new THREE.MeshStandardMaterial({
        color: hex, emissive: hex, emissiveIntensity: intensity,
        roughness: 0.3, metalness: 0, toneMapped: false,
        depthTest: false, depthWrite: false, transparent, opacity,
      });
    }
    const onTop = m => { m.renderOrder = 20; return m; };

    // curved arrow lying on the top face, facing the camera
    function arc(mat, { R = 1.7, span = 2.0, thick = 0.085, headR = 0.24, headL = 0.6 } = {}) {
      const g = new THREE.Group();
      const th0 = TH_CAM - DIR * span / 2, th1 = TH_CAM + DIR * span / 2;
      const P = th => new THREE.Vector3(R * Math.cos(th), FACE_Y, R * Math.sin(th));
      const pts = []; for (let i = 0; i <= 40; i++) pts.push(P(th0 + (th1 - th0) * i / 40));
      const tube = onTop(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 60, thick, 12, false), mat));
      g.add(tube);
      const tan = new THREE.Vector3(-Math.sin(th1), 0, Math.cos(th1)).multiplyScalar(DIR).normalize();
      const head = onTop(new THREE.Mesh(new THREE.ConeGeometry(headR, headL, 22), mat));
      head.position.copy(P(th1)); head.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tan);
      g.add(head);
      g.userData.tube = tube; g.userData.curve = P;
      return g;
    }

    // straight arrow showing where the front row travels
    function straight(mat, { z = 1.05, x0 = -1.15, x1 = 1.15, r = 0.075, headR = 0.24, headL = 0.5 } = {}) {
      const g = new THREE.Group();
      const shaftLen = (x1 - x0) - headL;
      const shaft = onTop(new THREE.Mesh(new THREE.CylinderGeometry(r, r, shaftLen, 16), mat));
      shaft.position.set(x0 + shaftLen / 2, FACE_Y, z);
      shaft.rotation.z = -Math.PI / 2;
      g.add(shaft);
      const head = onTop(new THREE.Mesh(new THREE.ConeGeometry(headR, headL, 22), mat));
      head.position.set(x1 - headL / 2, FACE_Y, z);
      head.rotation.z = -Math.PI / 2;
      g.add(head);
      return g;
    }

    // solid glowing frame around the top face
    function frame(mat, { S = 1.5, thick = 0.1 } = {}) {
      const g = new THREE.Group();
      const cs = [[S, S], [-S, S], [-S, -S], [S, -S]].map(([a, b]) => new THREE.Vector3(a, FACE_Y + 0.06, b));
      for (let i = 0; i < 4; i++) {
        const p1 = cs[i], p2 = cs[(i + 1) % 4], d = p2.clone().sub(p1);
        const bar = onTop(new THREE.Mesh(new THREE.BoxGeometry(thick, thick, d.length() + thick), mat));
        bar.position.copy(p1).add(p2).multiplyScalar(0.5);
        bar.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), d.normalize());
        g.add(bar);
      }
      return g;
    }

    // four corner brackets (focus-reticle style)
    function brackets(mat, { S = 1.5, len = 0.55, thick = 0.11 } = {}) {
      const g = new THREE.Group();
      for (const sx of [-1, 1]) for (const sz of [-1, 1]) {
        const cx = sx * S, cz = sz * S;
        const bx = onTop(new THREE.Mesh(new THREE.BoxGeometry(len, thick, thick), mat));
        bx.position.set(cx - sx * len / 2, FACE_Y + 0.06, cz); g.add(bx);
        const bz = onTop(new THREE.Mesh(new THREE.BoxGeometry(thick, thick, len), mat));
        bz.position.set(cx, FACE_Y + 0.06, cz - sz * len / 2); g.add(bz);
      }
      return g;
    }

    // two chevrons pointing along the turn
    function chevrons(mat) {
      const g = new THREE.Group();
      const mk = (cx, cz) => {
        const c = new THREE.Group();
        for (const s of [-1, 1]) {
          const b = onTop(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.11), mat));
          b.position.set(cx, FACE_Y + 0.06, cz + s * 0.17);
          b.rotation.y = s * -0.7; c.add(b);
        }
        return c;
      };
      g.add(mk(0.2, 0.9)); g.add(mk(0.75, 0.9));
      return g;
    }

    const topCubies = cube => cube.cubies.filter(c => Math.round(c.position.y / UNIT) === 1);
    const stickers = cubie => cubie.children.filter(ch => ch.userData.isSticker);

    // ---- the 10 combos ------------------------------------------------------
    const COMBOS = [
      { name: '发光边框 + 弧箭头', desc: '琥珀发光方框圈住转动面 + 曲线箭头(呼吸)',
        build(cube, g) { const c = 0xffb020; g.add(frame(glowMat(c))); const a = arc(glowMat(c)); g.add(a);
          return t => { const b = 0.5 + 0.5 * Math.sin(t * 2.6); g.traverse(o => o.material && (o.material.emissiveIntensity = 0.6 + 0.7 * b)); }; } },

      { name: '四角括号 + 直箭头', desc: '相机对焦式四角 + 直线箭头(指出行走方向)',
        build(cube, g) { const c = 0x35d0ff; g.add(brackets(glowMat(c))); g.add(straight(glowMat(c)));
          return t => { const b = 0.5 + 0.5 * Math.sin(t * 3); g.traverse(o => o.material && (o.material.emissiveIntensity = 0.6 + 0.6 * b)); }; } },

      { name: '聚光(暗化其余) + 细弧', desc: '其余面变暗,转动面全彩突出 + 白色细弧',
        build(cube, g) { topCubies(cube); cube.cubies.forEach(cu => { if (Math.round(cu.position.y / UNIT) !== 1) cu.children.forEach(ch => ch.material.color && ch.material.color.multiplyScalar(0.32)); });
          g.add(arc(glowMat(0xffffff, { intensity: 1.1 }), { thick: 0.06 }));
          return t => { const b = 0.5 + 0.5 * Math.sin(t * 2.4); g.traverse(o => o.material && (o.material.emissiveIntensity = 0.8 + 0.5 * b)); }; } },

      { name: '面自身呼吸 + 细弧', desc: '转动面按各自颜色发光呼吸(不改色相) + 琥珀细弧',
        build(cube, g) { const mats = []; topCubies(cube).forEach(cu => stickers(cu).forEach(s => { if (s.position.y > 0.4) { s.material.emissive.copy(s.material.color); mats.push(s.material); } }));
          g.add(arc(glowMat(0xffb020), { thick: 0.06 }));
          return t => { const b = 0.5 + 0.5 * Math.sin(t * 2.6); mats.forEach(m => m.emissiveIntensity = 0.12 + 0.5 * b); g.traverse(o => o.material && o.material.toneMapped === false && (o.material.emissiveIntensity = 0.7 + 0.4 * b)); }; } },

      { name: '抬起转动面 + 弧', desc: '把要转的一层稍微抬起(悬浮感) + 曲线箭头',
        build(cube, g) { const tops = topCubies(cube); g.add(arc(glowMat(0xffb020)));
          return t => { const lift = 0.12 + 0.06 * Math.sin(t * 2.2); tops.forEach(c => c.position.y = UNIT + lift); const b = 0.5 + 0.5 * Math.sin(t * 2.6); g.traverse(o => o.material && (o.material.emissiveIntensity = 0.7 + 0.5 * b)); }; } },

      { name: '走马灯虚线框 + 直箭头', desc: '边框像跑马灯一样流动 + 直线箭头',
        build(cube, g) { const c = 0x35d0ff; const segs = []; const N = 28, S = 1.5;
          const path = i => { const f = i / N * 4; const side = Math.floor(f), u = f - side; const A = [[S, S], [-S, S], [-S, -S], [S, -S]]; const p = A[side], q = A[(side + 1) % 4]; return new THREE.Vector3(p[0] + (q[0] - p[0]) * u, FACE_Y + 0.06, p[1] + (q[1] - p[1]) * u); };
          for (let i = 0; i < N; i++) { const m = glowMat(c); const b = onTop(new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.12, 0.12), m)); b.position.copy(path(i)); segs.push({ b, m, i }); g.add(b); }
          g.add(straight(glowMat(c)));
          return t => { segs.forEach(({ m, i }) => m.emissiveIntensity = 0.15 + 1.0 * Math.pow(0.5 + 0.5 * Math.sin(i / N * Math.PI * 2 - t * 4), 4)); }; } },

      { name: '霓虹粗弧(无框)', desc: '只用一条厚重霓虹弧线,极简 + 强呼吸',
        build(cube, g) { const a = arc(glowMat(0x35d0ff, { intensity: 1.2 }), { thick: 0.13, headR: 0.32, headL: 0.72 }); g.add(a);
          return t => { const b = 0.5 + 0.5 * Math.sin(t * 3.2); g.traverse(o => o.material && (o.material.emissiveIntensity = 0.7 + 0.9 * b)); }; } },

      { name: '双雪佛龙 + 发光框', desc: '两个 V 形指向 + 发光方框',
        build(cube, g) { const c = 0xffb020; g.add(frame(glowMat(c))); const ch = chevrons(glowMat(c, { intensity: 1.1 })); g.add(ch);
          return t => { ch.children.forEach((cc, k) => cc.children.forEach(b => b.material.emissiveIntensity = 0.3 + 1.0 * Math.pow(0.5 + 0.5 * Math.sin(t * 4 - k * 1.2), 3))); }; } },

      { name: '半透明色块 + 弧', desc: '转动面盖一层半透明高亮 + 曲线箭头',
        build(cube, g) { const ov = onTop(new THREE.Mesh(new THREE.PlaneGeometry(3, 3), glowMat(0x9fe8ff, { intensity: 0.5, transparent: true, opacity: 0.28 }))); ov.rotation.x = -Math.PI / 2; ov.position.y = FACE_Y + 0.05; g.add(ov);
          g.add(arc(glowMat(0xffb020)));
          return t => { const b = 0.5 + 0.5 * Math.sin(t * 2.4); ov.material.opacity = 0.14 + 0.22 * b; g.traverse(o => o.material && o.material.transparent === false && o.material.toneMapped === false && (o.material.emissiveIntensity = 0.7 + 0.4 * b)); }; } },

      { name: '流光弧:彗星点 + 框', desc: '一个亮点沿弧线流动指示方向 + 发光框',
        build(cube, g) { g.add(frame(glowMat(0xffb020, { intensity: 0.7 }))); const a = arc(glowMat(0x35d0ff, { intensity: 0.35, thick: 0.06 })); g.add(a);
          const dot = onTop(new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 16), glowMat(0xffffff, { intensity: 1.4 }))); g.add(dot);
          const span = 2.0, th0 = TH_CAM - DIR * span / 2, th1 = TH_CAM + DIR * span / 2;
          return t => { const u = (t * 0.6) % 1; const th = th0 + (th1 - th0) * u; dot.position.set(1.7 * Math.cos(th), FACE_Y, 1.7 * Math.sin(th)); }; } },
    ];

    // ---- render each combo in its own mini scene ----------------------------
    const grid = document.getElementById('grid');
    const views = [];
    COMBOS.forEach((combo, idx) => {
      const cell = document.createElement('div'); cell.className = 'cell';
      const canvas = document.createElement('canvas');
      const cap = document.createElement('div'); cap.className = 'cap';
      cap.innerHTML = `<b><span class="n">#${idx + 1}</span>${combo.name}</b><span>${combo.desc}</span>`;
      cell.append(canvas, cap); grid.appendChild(cell);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;

      const scene = new THREE.Scene();
      scene.add(new THREE.HemisphereLight(0xffffff, 0x556, 1.15));
      const key = new THREE.DirectionalLight(0xffffff, 1.9); key.position.set(5, 9, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xbcd0ff, 0.6); fill.position.set(-6, 2, -3); scene.add(fill);

      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(3.6, 4.2, 6); camera.lookAt(0, 0, 0);
      const controls = new OrbitControls(camera, canvas);
      controls.enableZoom = false; controls.enablePan = false;
      controls.enableDamping = true; controls.target.set(0, 0, 0);

      const cube = new RubiksCube();
      scene.add(cube.group);
      const overlay = new THREE.Group(); cube.group.add(overlay);
      const update = combo.build(cube, overlay);

      views.push({ renderer, scene, camera, controls, canvas, update });
    });

    function resize(v) {
      const w = v.canvas.clientWidth, h = v.canvas.clientHeight;
      if (v.canvas.width !== w || v.canvas.height !== h) {
        v.renderer.setSize(w, h, false); v.camera.aspect = w / h; v.camera.updateProjectionMatrix();
      }
    }
    (function loop() {
      requestAnimationFrame(loop);
      const t = performance.now() / 1000;
      for (const v of views) { resize(v); v.controls.update(); v.update?.(t); v.renderer.render(v.scene, v.camera); }
    })();
  </script>
</body>
</html>
