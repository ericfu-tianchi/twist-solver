<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Per-sticker Arrow Lab</title>
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #0b0e17; color: #eef1f7;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    header { padding: 22px 26px 6px; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 6px 0 0; color: #8a93a8; font-size: 13px; line-height: 1.6; max-width: 860px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px; padding: 18px 26px 60px; }
    .cell { background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px; overflow: hidden; }
    .cell canvas { width: 100%; height: 270px; display: block; cursor: grab; }
    .cap { padding: 11px 14px 13px; border-top: 1px solid rgba(255,255,255,.08); }
    .cap b { font-size: 13.5px; } .cap .n { color: #6ea8ff; margin-right: 6px; }
    .cap span { display: block; margin-top: 3px; font-size: 12px; color: #8a93a8; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>逐格方向箭头 · 样式对比(U 顶面转)</h1>
    <p>做法:给转动层每个朝向镜头的侧面色块画一个小箭头,指向该格运动方向(其余面不画)。这里比较不同的箭头"字形"样式。
       挑一个最好看清楚的编号,我再把它套到六个转向(U/D/L/R/F/B)逐一确认。可拖动观察。</p>
  </header>
  <div class="grid" id="grid"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RubiksCube, UNIT, COLORS } from './src/cube.js';
    import { CubeState, randomScramble } from './src/state.js';

    const SCRAMBLE = randomScramble(18);
    function scrambleColours(cube) {
      const st = new CubeState().moves(SCRAMBLE);
      cube.cubies.forEach(cu => {
        const p = [Math.round(cu.position.x / UNIT), Math.round(cu.position.y / UNIT), Math.round(cu.position.z / UNIT)];
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          const n = [Math.round(ch.position.x * 2), Math.round(ch.position.y * 2), Math.round(ch.position.z * 2)];
          const l = st.colorAt(p, n); if (l) ch.material.color.setHex(COLORS[l]);
        });
      });
    }
    const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
    function hsl(c, s, l) { const h = {}; c.getHSL(h); c.setHSL(h.h, clamp(h.s * s, 0, 1), clamp(h.l * l, 0, 1)); }
    function applyC(cube) {
      cube.cubies.forEach(cu => {
        const active = Math.round(cu.position.y / UNIT) === 1;
        cu.children.forEach(ch => { if (!ch.userData.isSticker) return; active ? hsl(ch.material.color, 1.16, 1.12) : hsl(ch.material.color, 0.42, 0.3); });
      });
    }
    function amat() { return new THREE.MeshStandardMaterial({ color: 0xffd21f, emissive: 0xffb200, emissiveIntensity: 0.9, roughness: 0.3, metalness: 0, toneMapped: false, side: THREE.DoubleSide }); }
    function dmat() { return new THREE.MeshStandardMaterial({ color: 0x1a1205, emissive: 0x000000, roughness: 0.6, metalness: 0, toneMapped: false, side: THREE.DoubleSide }); }
    function extrude(shape, t = 0.045) { const g = new THREE.ExtrudeGeometry(shape, { depth: t, bevelEnabled: false }); g.translate(0, 0, -t / 2); return g; }

    // arrow glyphs, built in local XY pointing +X, centred at origin
    function arrowShape(len, w, headL, headW) {
      const s = new THREE.Shape(); const x0 = -len / 2, x1 = len / 2, xh = x1 - headL;
      s.moveTo(x0, w / 2); s.lineTo(xh, w / 2); s.lineTo(xh, headW / 2); s.lineTo(x1, 0);
      s.lineTo(xh, -headW / 2); s.lineTo(xh, -w / 2); s.lineTo(x0, -w / 2); s.closePath(); return s;
    }
    function chevron(size) {
      const s = new THREE.Shape(); const a = size;
      s.moveTo(0.55 * a, 0); s.lineTo(0.05 * a, 0.5 * a); s.lineTo(-0.2 * a, 0.5 * a);
      s.lineTo(0.2 * a, 0); s.lineTo(-0.2 * a, -0.5 * a); s.lineTo(0.05 * a, -0.5 * a); s.closePath(); return s;
    }
    // taper: shaft grows toward head
    function taperShape(len, wTail, wHead, headL, headW) {
      const s = new THREE.Shape(); const x0 = -len / 2, x1 = len / 2, xh = x1 - headL, N = 8;
      const w = f => (wTail + (wHead - wTail) * f) / 2;
      for (let i = 0; i <= N; i++) { const f = i / N; s.lineTo(x0 + (xh - x0) * f, w(f)); } // top edge (moveTo via first lineTo from default 0,0? use points)
      // rebuild cleanly:
      const s2 = new THREE.Shape();
      s2.moveTo(x0, w(0));
      for (let i = 1; i <= N; i++) { const f = i / N; s2.lineTo(x0 + (xh - x0) * f, w(f)); }
      s2.lineTo(xh, headW / 2); s2.lineTo(x1, 0); s2.lineTo(xh, -headW / 2);
      for (let i = N; i >= 0; i--) { const f = i / N; s2.lineTo(x0 + (xh - x0) * f, -w(f)); }
      s2.closePath(); return s2;
    }

    const GLYPHS = [
      { name: '标准实心', desc: '细杆 + 三角头,经典清楚', shapes: () => [arrowShape(0.62, 0.15, 0.26, 0.36)] },
      { name: '纤细', desc: '细一点,精致', shapes: () => [arrowShape(0.64, 0.09, 0.24, 0.28)] },
      { name: '粗圆润', desc: '粗杆大头,醒目友好', shapes: () => [arrowShape(0.58, 0.22, 0.28, 0.46)] },
      { name: '仅箭头(V)', desc: '只有箭头/雪佛龙,极简', shapes: () => [chevron(0.62)] },
      { name: '渐宽(书法感)', desc: '尾细头宽,有笔锋', shapes: () => [taperShape(0.64, 0.06, 0.2, 0.26, 0.4)] },
      { name: '双雪佛龙 »', desc: '两个 V,动感更强', shapes: () => { const a = chevron(0.42); const b = chevron(0.42); a.__dx = -0.16; b.__dx = 0.16; return [a, b]; } },
    ];

    // draw an arrow on each camera-facing SIDE sticker of the turning (top) layer,
    // pointing along that sticker's motion direction
    function motionArrows(cube, glyph, mat, dark, camPos) {
      const g = new THREE.Group();
      const omega = new THREE.Vector3(0, 1, 0);           // U turn (a rotation sense)
      const camDir = camPos.clone().normalize();
      cube.cubies.forEach(cu => {
        if (Math.round(cu.position.y / UNIT) !== 1) return; // top layer
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          const n = new THREE.Vector3(Math.round(ch.position.x * 2), Math.round(ch.position.y * 2), Math.round(ch.position.z * 2));
          if (Math.abs(n.y) > 0.5) return;                 // skip the top face (axis face)
          if (n.dot(camDir) <= 0.2) return;                // only camera-facing side faces
          const world = cu.position.clone().add(ch.position);
          const v = new THREE.Vector3().crossVectors(omega, world);
          v.addScaledVector(n, -v.dot(n));                 // project onto the face plane
          if (v.lengthSq() < 1e-6) return; v.normalize();
          const y = new THREE.Vector3().crossVectors(n, v).normalize();
          const basis = new THREE.Matrix4().makeBasis(v, y, n);
          for (const sh of glyph.shapes()) {
            const dx = sh.__dx || 0;
            const m = new THREE.Mesh(extrude(sh), mat);
            m.quaternion.setFromRotationMatrix(basis);
            m.position.copy(world).addScaledVector(n, 0.055).addScaledVector(v, dx);
            g.add(m);
          }
        });
      });
      return g;
    }

    const grid = document.getElementById('grid');
    const views = [];
    GLYPHS.forEach((glyph, idx) => {
      const cell = document.createElement('div'); cell.className = 'cell';
      const canvas = document.createElement('canvas');
      const cap = document.createElement('div'); cap.className = 'cap';
      cap.innerHTML = `<b><span class="n">#${idx + 1}</span>${glyph.name}</b><span>${glyph.desc}</span>`;
      cell.append(canvas, cap); grid.appendChild(cell);
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;
      const scene = new THREE.Scene();
      scene.add(new THREE.HemisphereLight(0xffffff, 0x556, 1.15));
      const key = new THREE.DirectionalLight(0xffffff, 1.9); key.position.set(5, 9, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xbcd0ff, 0.6); fill.position.set(-6, 2, -3); scene.add(fill);
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(4.4, 3.6, 6.2); camera.lookAt(0, 0, 0);
      const controls = new OrbitControls(camera, canvas); controls.enableZoom = false; controls.enablePan = false; controls.enableDamping = true;
      const cube = new RubiksCube(); scrambleColours(cube); applyC(cube); scene.add(cube.group);
      const mat = amat();
      const arrows = motionArrows(cube, glyph, mat, dmat(), camera.position); cube.group.add(arrows);
      views.push({ renderer, scene, camera, controls, canvas, mat });
    });
    function resize(v) { const w = v.canvas.clientWidth, h = v.canvas.clientHeight; if (v.canvas.width !== w || v.canvas.height !== h) { v.renderer.setSize(w, h, false); v.camera.aspect = w / h; v.camera.updateProjectionMatrix(); } }
    (function loop() {
      requestAnimationFrame(loop);
      const b = 0.7 + 0.3 * (0.5 + 0.5 * Math.sin(performance.now() / 360));
      for (const v of views) { resize(v); v.controls.update(); v.mat.emissiveIntensity = b; v.renderer.render(v.scene, v.camera); }
    })();
  </script>
</body>
</html>
