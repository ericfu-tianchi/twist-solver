<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Cubic Solver</title>
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "cubejs": "https://esm.sh/cubejs@1.3.2",
      "cubejs/lib/solve.js": "https://esm.sh/cubejs@1.3.2/lib/solve.js"
    }
  }
  </script>
</head>
<body>
  <div id="scene"></div>

  <div class="size-rail" title="魔方大小">
    <span>大</span>
    <input id="sizeSlider" type="range" min="0.5" max="1.2" step="0.02" />
    <span>小</span>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="logo">◧</span>
      <div>
        <h1>Cubic&nbsp;Solver</h1>
        <p>跟着屏幕，一步步复原你的魔方</p>
      </div>
    </div>

    <div class="topbar-actions">
      <button id="recenter" class="pill icon" title="正对视角（C）">
        <span class="glyph">◎</span> 正对
      </button>
      <button id="freeToggle" class="pill" aria-pressed="false" title="自由观察模式（空格）">
        <span class="dot"></span> 自由观察 · Free
      </button>
    </div>
  </header>

  <div class="dock">
    <section class="panel faces">
      <div class="panel-title">拧一层 · Turn a layer</div>
      <div class="btn-row">
        <button class="face" data-face="U"><i style="background:#f7f7f5"></i>U</button>
        <button class="face" data-face="D"><i style="background:#ffd500"></i>D</button>
        <button class="face" data-face="L"><i style="background:#ff5800"></i>L</button>
        <button class="face" data-face="R"><i style="background:#b71234"></i>R</button>
        <button class="face" data-face="F"><i style="background:#009b48"></i>F</button>
        <button class="face" data-face="B"><i style="background:#0046ad"></i>B</button>
      </div>
      <div class="hint">点击 = 顺时针 · Shift＋点击 / 右键 = 逆时针 · 也可直接在魔方上拖动</div>
    </section>

    <section class="panel whole">
      <div class="panel-title">整体旋转 · Rotate cube</div>
      <div class="btn-row">
        <button class="ghost" data-move="x"  title="绕 R 方向翻转">x</button>
        <button class="ghost" data-move="x'" title="反向">x′</button>
        <button class="ghost" data-move="y"  title="绕 U 方向翻转">y</button>
        <button class="ghost" data-move="y'" title="反向">y′</button>
        <button class="ghost" data-move="z"  title="绕 F 方向翻转">z</button>
        <button class="ghost" data-move="z'" title="反向">z′</button>
      </div>
      <div class="hint">键盘：X / Y / Z（＋Shift 反向）</div>
    </section>

    <section class="panel actions">
      <div class="panel-title">操作 · Actions</div>
      <div class="method-row">
        <span>方法</span>
        <button class="modebtn on" data-mode="short">最短 · ~20步</button>
        <button class="modebtn" data-mode="basic">基础 · ~130步</button>
      </div>
      <div class="btn-row">
        <button id="scramble" class="ghost">打乱 Scramble</button>
        <button id="reset" class="ghost">复原 Reset</button>
        <button id="edit" class="ghost">编辑 Edit</button>
        <button id="solve" class="primary">求解 Solve →</button>
      </div>
      <div class="hint">「编辑」填入你真实魔方的颜色，或「打乱」后直接「求解」跟着做</div>
    </section>
  </div>

  <!-- guided solve panel -->
  <div id="solvePanel" class="solve-panel" hidden>
    <div class="solve-head">
      <span id="solvePhase" class="solve-phase">—</span>
      <span class="solve-head-btns">
        <button id="solveView" class="mini" title="回到最佳视角">最佳视角</button>
        <button id="solveExit" class="mini" title="退出引导">退出 ✕</button>
      </span>
    </div>
    <div class="solve-body">
      <div id="solveMove" class="solve-move">R</div>
      <div class="solve-copy">
        <div id="solveHint" class="solve-hint">跟着箭头拧这一层</div>
        <div id="solveCounter" class="solve-counter">第 1 / 1 步</div>
      </div>
    </div>
    <div class="solve-progress"><div id="solveBar" class="solve-bar"></div></div>
    <div class="solve-speed">
      <span>自动速度</span>
      <button class="speed" data-speed="0.5">0.5×</button>
      <button class="speed on" data-speed="1">1×</button>
      <button class="speed" data-speed="2">2×</button>
    </div>
    <div class="solve-foot">
      <button id="solvePrev" class="ghost">← 上一步</button>
      <button id="solveAuto" class="ghost">自动 ▶</button>
      <button id="solveNext" class="primary">做好了 · 下一步 →</button>
    </div>
  </div>

  <!-- cube editor -->
  <div id="editModal" class="modal" hidden>
    <div class="modal-card">
      <h2>编辑你的魔方 · Enter your cube</h2>
      <p class="modal-sub">选一个颜色，点格子涂色。中心块固定。把手上魔方六个面的颜色照着填进来，然后「校验并应用」。</p>
      <div class="editor">
        <div id="cubeNet" class="cube-net"></div>
        <div class="editor-side">
          <div class="palette" id="palette"></div>
          <div id="editMsg" class="edit-msg"></div>
          <div class="editor-actions">
            <button id="editLoad" class="ghost">载入当前</button>
            <button id="editReset" class="ghost">重置为已还原</button>
            <button id="editCancel" class="ghost">取消</button>
            <button id="editApply" class="primary">校验并应用</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
