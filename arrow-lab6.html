<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arrow Colour Lab</title>
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #0b0e17; color: #eef1f7;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    header { padding: 22px 26px 6px; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 6px 0 0; color: #8a93a8; font-size: 13px; line-height: 1.6; max-width: 860px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px; padding: 18px 26px 60px; }
    .cell { background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px; overflow: hidden; }
    .cell canvas { width: 100%; height: 280px; display: block; cursor: grab; }
    .cap { padding: 11px 14px 13px; border-top: 1px solid rgba(255,255,255,.08); }
    .cap b { font-size: 14px; } .cap .n { color: #6ea8ff; margin-right: 6px; }
    .cap span { display: block; margin-top: 3px; font-size: 12px; color: #8a93a8; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>方向箭头 · 颜色对比(U 顶面转)</h1>
    <p>同一套逐格实心箭头,只换颜色。因为箭头会压在各种颜色的格子上,描边方案能保证在任何底色上都清楚。挑一个编号。可拖动观察。</p>
  </header>
  <div class="grid" id="grid"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RubiksCube, UNIT, COLORS } from './src/cube.js';
    import { CubeState, randomScramble } from './src/state.js';

    const SCRAMBLE = randomScramble(18);
    function scrambleColours(cube) {
      const st = new CubeState().moves(SCRAMBLE);
      cube.cubies.forEach(cu => {
        const p = [Math.round(cu.position.x / UNIT), Math.round(cu.position.y / UNIT), Math.round(cu.position.z / UNIT)];
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          const n = [Math.round(ch.position.x * 2), Math.round(ch.position.y * 2), Math.round(ch.position.z * 2)];
          const l = st.colorAt(p, n); if (l) ch.material.color.setHex(COLORS[l]);
        });
      });
    }
    const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
    function hsl(c, s, l) { const h = {}; c.getHSL(h); c.setHSL(h.h, clamp(h.s * s, 0, 1), clamp(h.l * l, 0, 1)); }
    function applyC(cube) {
      cube.cubies.forEach(cu => {
        const active = Math.round(cu.position.y / UNIT) === 1;
        cu.children.forEach(ch => { if (!ch.userData.isSticker) return; active ? hsl(ch.material.color, 1.16, 1.12) : hsl(ch.material.color, 0.42, 0.3); });
      });
    }
    function extrude(shape, t = 0.04) { const g = new THREE.ExtrudeGeometry(shape, { depth: t, bevelEnabled: false }); g.translate(0, 0, -t / 2); return g; }
    function arrowShape(len, w, headL, headW) {
      const s = new THREE.Shape(); const x0 = -len / 2, x1 = len / 2, xh = x1 - headL;
      s.moveTo(x0, w / 2); s.lineTo(xh, w / 2); s.lineTo(xh, headW / 2); s.lineTo(x1, 0);
      s.lineTo(xh, -headW / 2); s.lineTo(xh, -w / 2); s.lineTo(x0, -w / 2); s.closePath(); return s;
    }
    const flat = hex => new THREE.MeshBasicMaterial({ color: hex, side: THREE.DoubleSide, toneMapped: false });

    // per-sticker motion arrows (U turn) with an optional outline colour
    function motionArrows(cube, camPos, fillHex, outlineHex) {
      const g = new THREE.Group();
      const omega = new THREE.Vector3(0, -1, 0); // U (matches cube.js sign)
      const camDir = camPos.clone().normalize();
      const geo = extrude(arrowShape(0.62, 0.15, 0.26, 0.36));
      cube.cubies.forEach(cu => {
        if (Math.round(cu.position.y / UNIT) !== 1) return;
        cu.children.forEach(ch => {
          if (!ch.userData.isSticker) return;
          const n = new THREE.Vector3(Math.round(ch.position.x * 2), Math.round(ch.position.y * 2), Math.round(ch.position.z * 2));
          if (Math.abs(n.y) > 0.5) return;
          if (n.dot(camDir) <= 0.2) return;
          const world = cu.position.clone().add(ch.position);
          const v = new THREE.Vector3().crossVectors(omega, world);
          v.addScaledVector(n, -v.dot(n)); if (v.lengthSq() < 1e-6) return; v.normalize();
          const y = new THREE.Vector3().crossVectors(n, v).normalize();
          const basis = new THREE.Matrix4().makeBasis(v, y, n);
          if (outlineHex !== null) {
            const o = new THREE.Mesh(geo, flat(outlineHex));
            o.quaternion.setFromRotationMatrix(basis); o.position.copy(world).addScaledVector(n, 0.05);
            o.scale.set(1.34, 1.34, 1); g.add(o);
          }
          const m = new THREE.Mesh(geo, flat(fillHex));
          m.quaternion.setFromRotationMatrix(basis); m.position.copy(world).addScaledVector(n, 0.066);
          g.add(m);
        });
      });
      return g;
    }

    const COLOURS = [
      { name: '黑色', desc: '像你参考图那样,在鲜艳格上对比最强、最干净', fill: 0x141414, outline: null },
      { name: '白色', desc: '干净,大多数格上清楚(白格上略弱)', fill: 0xffffff, outline: null },
      { name: '黄色(现在)', desc: '暖色/白格上会糊', fill: 0xffd21f, outline: null },
      { name: '电光青', desc: '现代、跳,冷色格上略融', fill: 0x24d8ff, outline: null },
      { name: '黑 + 白描边', desc: '任何底色都清楚(推荐)', fill: 0x141414, outline: 0xffffff },
      { name: '白 + 黑描边', desc: '任何底色都清楚,更亮', fill: 0xffffff, outline: 0x111111 },
    ];

    const grid = document.getElementById('grid');
    const views = [];
    COLOURS.forEach((col, idx) => {
      const cell = document.createElement('div'); cell.className = 'cell';
      const canvas = document.createElement('canvas');
      const cap = document.createElement('div'); cap.className = 'cap';
      cap.innerHTML = `<b><span class="n">#${idx + 1}</span>${col.name}</b><span>${col.desc}</span>`;
      cell.append(canvas, cap); grid.appendChild(cell);
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;
      const scene = new THREE.Scene();
      scene.add(new THREE.HemisphereLight(0xffffff, 0x556, 1.15));
      const key = new THREE.DirectionalLight(0xffffff, 1.9); key.position.set(5, 9, 6); scene.add(key);
      const fill = new THREE.DirectionalLight(0xbcd0ff, 0.6); fill.position.set(-6, 2, -3); scene.add(fill);
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(4.4, 3.6, 6.2); camera.lookAt(0, 0, 0);
      const controls = new OrbitControls(camera, canvas); controls.enableZoom = false; controls.enablePan = false; controls.enableDamping = true;
      const cube = new RubiksCube(); scrambleColours(cube); applyC(cube); scene.add(cube.group);
      cube.group.add(motionArrows(cube, camera.position, col.fill, col.outline));
      views.push({ renderer, scene, camera, controls, canvas });
    });
    function resize(v) { const w = v.canvas.clientWidth, h = v.canvas.clientHeight; if (v.canvas.width !== w || v.canvas.height !== h) { v.renderer.setSize(w, h, false); v.camera.aspect = w / h; v.camera.updateProjectionMatrix(); } }
    (function loop() { requestAnimationFrame(loop); for (const v of views) { resize(v); v.controls.update(); v.renderer.render(v.scene, v.camera); } })();
  </script>
</body>
</html>
